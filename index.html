<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a1628">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Death March">
  <title>Death March</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh; /* Safari: track the dynamic toolbar chrome */
      overflow: hidden;
      background: #0a1628;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #game {
      display: block;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 22, 40, 0.92);
      color: #fff;
      text-align: center;
      z-index: 10;
      padding: 24px;
    }

    .overlay.hidden {
      display: none;
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(64px, 18vw, 120px);
      letter-spacing: 0.06em;
      line-height: 0.95;
      color: #ffffff;
      text-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    }

    .subtitle {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(15px, 4.2vw, 20px);
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8fb4d9;
      margin-top: 10px;
    }

    .prompt {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(14px, 4vw, 18px);
      font-weight: 700;
      letter-spacing: 0.22em;
      color: #ffd166;
      margin-top: 56px;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .end-time {
      font-family: 'DM Mono', monospace;
      font-size: clamp(22px, 7vw, 34px);
      color: #ffd166;
      margin-top: 18px;
    }

    .btn {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(14px, 4vw, 18px);
      font-weight: 700;
      letter-spacing: 0.18em;
      color: #0a1628;
      background: #ffd166;
      border: none;
      border-radius: 8px;
      padding: 16px 36px;
      margin-top: 48px;
      cursor: pointer;
      touch-action: manipulation;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .photo-frame {
      width: 78vw;
      max-width: 420px;
      height: 52vw;
      max-height: 280px;
      border-radius: 10px;
      background: #333;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    }

    .photo-caption {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(14px, 4vw, 18px);
      max-width: 80vw;
      margin-top: 18px;
      color: #ffffff;
    }

    .prompt.small {
      font-size: clamp(11px, 3vw, 14px);
      margin-top: 34px;
      animation: none;
      color: #8fb4d9;
    }

    .mate-row {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .mate {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(11px, 3vw, 13px);
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #8fb4d9;
      background: transparent;
      border: 2px solid rgba(143, 180, 217, 0.5);
      border-radius: 20px;
      padding: 9px 14px;
      cursor: pointer;
      touch-action: manipulation;
    }

    .mate.on {
      color: #0a1628;
      background: #ffd166;
      border-color: #ffd166;
    }

    .mate.lead {
      color: #0a1628;
      background: #8fb4d9;
      border-color: #8fb4d9;
    }

    .mate:disabled {
      opacity: 0.28;
    }

    .start-scroll {
      overflow-y: auto;
      justify-content: flex-start;
      padding-top: calc(28px + env(safe-area-inset-top));
      padding-bottom: 28px;
    }

    .mate-row {
      max-width: 340px;
    }

    .hand-row {
      display: flex;
      gap: 16px;
      margin-top: 16px;
    }

    .hand-row .btn {
      margin-top: 0;
      padding: 14px 26px;
    }

    .version {
      position: fixed;
      bottom: calc(6px + env(safe-area-inset-bottom));
      left: 0;
      right: 0;
      text-align: center;
      z-index: 20;
      pointer-events: none;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.35);
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="start-screen" class="overlay start-scroll">
    <div class="title">DEATH MARCH</div>
    <div class="subtitle">Tiki Beach to Daytona</div>
    <div class="prompt small">CHOOSE YOUR CHARACTER</div>
    <div class="mate-row" id="char-row"></div>
    <div class="prompt small">WHO'S WALKING WITH YOU</div>
    <div class="mate-row" id="sup-row"></div>
    <div class="prompt small">CHOOSE YOUR THUMB — TAP TO START</div>
    <div class="hand-row">
      <button class="btn" id="hand-left">LEFTY</button>
      <button class="btn" id="hand-right">RIGHTY</button>
    </div>
  </div>

  <div id="end-screen" class="overlay hidden">
    <div class="title" id="end-title">YOU MADE IT<br>TO DAYTONA</div>
    <div class="end-time" id="end-time">0.0s</div>
    <div class="subtitle" id="end-score"></div>
    <button class="btn" id="walk-again">WALK AGAIN</button>
  </div>

  <div id="photo-overlay" class="overlay hidden">
    <div class="photo-frame" id="photo-frame"></div>
    <div class="photo-caption" id="photo-caption"></div>
    <div class="prompt">TAP TO CONTINUE</div>
  </div>

  <div class="version" id="version"></div>

  <!-- Invisible probe: exposes env(safe-area-inset-top) to canvas code -->
  <div id="safe-probe"
       style="position: fixed; top: 0; left: 0; width: 0; height: 0;
              padding-top: env(safe-area-inset-top, 0px); visibility: hidden;"></div>

  <script src="js/scripts.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>
