<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a1628">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Death March">
  <title>Death March</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh; /* Safari: track the dynamic toolbar chrome */
      overflow: hidden;
      background: #0a1628;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #game {
      display: block;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 22, 40, 0.92);
      color: #fff;
      text-align: center;
      z-index: 10;
      padding: 24px;
    }

    .overlay.hidden {
      display: none;
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(64px, 18vw, 120px);
      letter-spacing: 0.06em;
      line-height: 0.95;
      color: #ffffff;
      text-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    }

    .subtitle {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(15px, 4.2vw, 20px);
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8fb4d9;
      margin-top: 10px;
    }

    .prompt {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(14px, 4vw, 18px);
      font-weight: 700;
      letter-spacing: 0.22em;
      color: #ffd166;
      margin-top: 56px;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .end-time {
      font-family: 'DM Mono', monospace;
      font-size: clamp(22px, 7vw, 34px);
      color: #ffd166;
      margin-top: 18px;
    }

    .btn {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(14px, 4vw, 18px);
      font-weight: 700;
      letter-spacing: 0.18em;
      color: #0a1628;
      background: #ffd166;
      border: none;
      border-radius: 8px;
      padding: 16px 36px;
      margin-top: 48px;
      cursor: pointer;
      touch-action: manipulation;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .msg-card {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(15px, 4.2vw, 19px);
      line-height: 1.45;
      color: #ffffff;
      background: rgba(10, 22, 40, 0.95);
      border: 2px solid #ffd166;
      border-radius: 12px;
      padding: 22px 24px;
      max-width: 82vw;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    }

    .photo-frame {
      width: 78vw;
      max-width: 420px;
      height: 52vw;
      max-height: 280px;
      border-radius: 10px;
      background: #333;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    }

    .photo-caption {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(14px, 4vw, 18px);
      max-width: 80vw;
      margin-top: 18px;
      color: #ffffff;
    }

    .prompt.small {
      font-size: clamp(11px, 3vw, 14px);
      margin-top: 34px;
      animation: none;
      color: #8fb4d9;
    }

    .mate-row {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .mate {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(11px, 3vw, 13px);
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #8fb4d9;
      background: transparent;
      border: 2px solid rgba(143, 180, 217, 0.5);
      border-radius: 20px;
      padding: 9px 14px;
      cursor: pointer;
      touch-action: manipulation;
    }

    .mate.on {
      color: #0a1628;
      background: #ffd166;
      border-color: #ffd166;
    }

    .mate.lead {
      color: #0a1628;
      background: #8fb4d9;
      border-color: #8fb4d9;
    }

    .mate:disabled {
      opacity: 0.28;
    }

    /* Real avatar photo inside a selection chip. The photos are tall oval
       cameos, so cover-crop them into a circle anchored near the face.
       The img stays hidden until its photo loads — a character with no
       photo yet keeps the plain text pill. */
    .mate {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .mate .face {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      object-fit: cover;
      object-position: 50% 16%;
      background: rgba(255, 255, 255, 0.08);
      flex: none;
      pointer-events: none;
    }

    /* ---- Character selection carousels (Forge-style picker) ---------- */
    .carousel {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      width: 100%;
      max-width: 460px;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
      padding: 10px 18px 16px;
      scrollbar-width: none;
    }

    .carousel::-webkit-scrollbar { display: none; }

    .card {
      flex: none;
      scroll-snap-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 0.16s ease;
    }

    .card .disc {
      position: relative;
      flex: none; /* keep the square size; absolute children give 0 content height */
      border-radius: 50%;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
      border: 3px solid transparent;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .card .disc img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 50% 15%;
    }

    .card .disc .initial {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      color: rgba(255, 255, 255, 0.9);
      letter-spacing: 0.04em;
    }

    .card .cname {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #8fb4d9;
      white-space: nowrap;
    }

    /* Lead carousel — larger discs, gold ring + scale on the chosen lead */
    .lead-carousel .disc { width: 92px; height: 92px; }
    .lead-carousel .initial { font-size: 42px; }
    .lead-carousel .card.lead { transform: scale(1.09); }
    .lead-carousel .card.lead .disc {
      border-color: #ffd166;
      box-shadow: 0 0 0 3px rgba(255, 209, 102, 0.35), 0 8px 20px rgba(0, 0, 0, 0.55);
    }
    .lead-carousel .card.lead .cname { color: #ffd166; }

    /* Squad carousel — smaller discs; the current lead is dropped out */
    .squad-carousel .disc { width: 66px; height: 66px; }
    .squad-carousel .initial { font-size: 28px; }
    .squad-carousel .card.excluded { display: none; }
    .squad-carousel .card.picked .disc { border-color: #8fb4d9; }
    .squad-carousel .card.picked .cname { color: #ffffff; }

    /* Team box — live thumbnails of the chosen squad; tap a thumb to drop */
    .team-box {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 360px;
      min-height: 62px;
      margin-top: 12px;
      padding: 11px 14px;
      border: 1px dashed rgba(143, 180, 217, 0.35);
      border-radius: 14px;
    }

    .team-empty {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      letter-spacing: 0.1em;
      color: rgba(143, 180, 217, 0.6);
    }

    .team-thumb {
      position: relative;
      flex: none;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(143, 180, 217, 0.5);
      padding: 0;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.4);
      touch-action: manipulation;
    }

    .team-thumb img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 50% 15%;
    }

    .team-thumb .initial {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 19px;
      color: rgba(255, 255, 255, 0.9);
    }

    .team-thumb .rm {
      position: absolute;
      top: -1px;
      right: -1px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #e63946;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      line-height: 15px;
      text-align: center;
    }

    .start-scroll {
      overflow-y: auto;
      justify-content: flex-start;
      padding-top: calc(28px + env(safe-area-inset-top));
      padding-bottom: 28px;
    }

    .mate-row {
      max-width: 340px;
    }

    .hand-row {
      display: flex;
      gap: 16px;
      margin-top: 16px;
    }

    .hand-row .btn {
      margin-top: 0;
      padding: 14px 26px;
    }

    .version {
      position: fixed;
      bottom: calc(6px + env(safe-area-inset-bottom));
      left: 0;
      right: 0;
      text-align: center;
      z-index: 20;
      pointer-events: none;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.35);
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="start-screen" class="overlay start-scroll">
    <div class="title">DEATH MARCH</div>
    <div class="subtitle">Tiki Beach to Daytona</div>
    <div class="prompt small">CHOOSE YOUR CHARACTER</div>
    <div class="carousel lead-carousel" id="lead-carousel"></div>
    <div class="prompt small">WHO'S WALKING WITH YOU</div>
    <div class="carousel squad-carousel" id="squad-carousel"></div>
    <div class="prompt small">YOUR TEAM</div>
    <div class="team-box" id="team-box"></div>
    <div class="prompt small">MODE</div>
    <div class="mate-row" id="mode-row">
      <button class="mate lead" id="mode-classic">CLASSIC</button>
      <button class="mate" id="mode-endless">ENDLESS</button>
    </div>
    <div class="prompt small">CHOOSE YOUR THUMB — TAP TO START</div>
    <div class="hand-row">
      <button class="btn" id="hand-left">LEFTY</button>
      <button class="btn" id="hand-right">RIGHTY</button>
    </div>
  </div>

  <div id="end-screen" class="overlay hidden">
    <div class="title" id="end-title">YOU MADE IT<br>TO DAYTONA</div>
    <div class="subtitle" id="end-msg"></div>
    <div class="end-time" id="end-time">0.0s</div>
    <div class="subtitle" id="end-score"></div>
    <button class="btn" id="walk-again">WALK AGAIN</button>
  </div>

  <div id="msg-overlay" class="overlay hidden">
    <div class="msg-card" id="msg-card"></div>
    <div class="prompt">TAP TO CONTINUE</div>
  </div>

  <div id="photo-overlay" class="overlay hidden">
    <div class="photo-frame" id="photo-frame"></div>
    <div class="photo-caption" id="photo-caption"></div>
    <div class="prompt">TAP TO CONTINUE</div>
  </div>

  <div class="version" id="version"></div>

  <!-- Invisible probe: exposes env(safe-area-inset-top) to canvas code -->
  <div id="safe-probe"
       style="position: fixed; top: 0; left: 0; width: 0; height: 0;
              padding-top: env(safe-area-inset-top, 0px); visibility: hidden;"></div>

  <script src="js/scripts.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>
